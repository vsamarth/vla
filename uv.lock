    { name = "accelerate", specifier = ">=1.13.0" },
    { name = "pillow", specifier = ">=12.2.0" },
    { name = "requests", specifier = ">=2.33.1" },
    { name = "torch", marker = "sys_platform != 'linux'", specifier = ">=2.11.0" },
    { name = "torch", marker = "sys_platform == 'linux'", specifier = ">=2.11.0", index = "https://download.pytorch.org/whl/cu128" },
    { name = "torchaudio", marker = "sys_platform != 'linux'" },
    { name = "torchaudio", marker = "sys_platform == 'linux'", index = "https://download.pytorch.org/whl/cu128" },
    { name = "torchvision", marker = "sys_platform != 'linux'" },
    { name = "torchvision", marker = "sys_platform == 'linux'", index = "https://download.pytorch.org/whl/cu128" },
    { name = "transformers", specifier = ">=5.5.4" },
]
